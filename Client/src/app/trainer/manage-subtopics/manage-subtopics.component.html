@if (!loader) {
  <div class="container subtopic-container mt-2">

    <!-- Subject Display -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Subject</label>
      <input
        type="text"
        class="form-control shadow-sm bg-light-subtle"
        [disabled]="true"
        [value]="subject().subjectName"
      />
    </div>

    <!-- Add Subtopic Button -->
    <div class="text-end mb-4">
      <button (click)="toggleSubtopicForm('yes')" class="btn btn-primary px-4">
        + Add Subtopic
      </button>
    </div>

    <!-- Add Subtopic Form -->
    <form
      *ngIf="showSubtopicForm"
      [formGroup]="subtopicForm"
      (ngSubmit)="onSubmit()"
      class="animated-form"
    >
      <div class="mb-3">
        <label for="subTopicName" class="form-label fw-semibold">Subtopic Name</label>
        <input
          type="text"
          id="subTopicName"
          class="form-control"
          formControlName="subTopicName"
          placeholder="Enter subtopic name"
          required
        />
        <small
          class="validation-error"
          *ngIf="subtopicForm.get('subTopicName')?.invalid && subtopicForm.get('subTopicName')?.touched"
        >
          Subtopic name is required.
        </small>
      </div>

      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-success px-4" [disabled]="!subtopicForm.valid">
          Save Subtopic
        </button>
        <button type="button" class="btn btn-outline-secondary px-4" (click)="toggleSubtopicForm('no')">
          Cancel
        </button>
      </div>
    </form>

    <!-- Subtopic Table -->
    <div class="mt-5">
      <h5 class="mb-3 gradient-heading">Existing Subtopics</h5>
      <div class="table-responsive">
        <table class="table table-striped table-hover border rounded-3 shadow-sm" *ngIf="subtopics().length > 0; else noSubtopics">
          <thead class="text-center text-nowrap">
            <tr>
              <th>🆔 Subtopic ID</th>
              <th>📘 Subtopic Name</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let subtopic of subtopics()" class="text-center align-middle">
              <td class="fw-semibold">{{ subtopic.subtopicId }}</td>
              <td>{{ subtopic.name }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="text-end mt-3">
        <button class="btn btn-success" (click)="exportToExcel()">⬇️ Download Excel</button>
      </div>

      <ng-template #noSubtopics>
        <p class="text-danger fw-semibold mt-3">⚠️ No subtopics yet.</p>
      </ng-template>
    </div>
  </div>
}
