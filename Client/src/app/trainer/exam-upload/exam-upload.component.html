<div class="container mt-1">
  <form
    #examForm="ngForm"
    (ngSubmit)="onSubmit(examForm)"
    class="exam-form-container"
  >
    <!-- Header Badge (above the form) -->
<div class="exam-heading-container mb-4 text-center">
  <div class="subject-badge animated-fade-in">
    <strong  class="me-2">Subject :</strong> <i>{{ subjectName }}</i>  
  </div>
</div>


    <!-- Row 1 -->
    <div class="row">
      <div class="col-md-6">
        <label for="title" class="form-label">Exam Title</label>
        <input
          type="text"
          id="title"
          name="title"
          class="form-control"
          [(ngModel)]="examData.title"
          required
          minlength="1"
          #title="ngModel"
        />
        <div *ngIf="title.invalid && title.touched" class="validation-error">
          Title is required (min 1 characters).
        </div>
      </div>

      <div class="col-md-6">
        <label for="duration" class="form-label">Duration (minutes)</label>
        <input
          type="number"
          id="duration"
          name="duration"
          class="form-control"
          [(ngModel)]="examData.duration"
          required
          min="1"
          #duration="ngModel"
        />
        <div *ngIf="duration.invalid && duration.touched" class="validation-error">
          Duration is required (min 1).
        </div>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="row g-4 mt-1">
      <div class="col-md-6">
        <label for="activeFrom" class="form-label">Active From</label>
        <input
          type="date"
          id="activeFrom"
          name="activeFrom"
          class="form-control"
          [min]="minDate"
          [(ngModel)]="examData.activeFrom"
          required
          #activeFrom="ngModel"
        />
        <div *ngIf="activeFrom.invalid && activeFrom.touched" class="validation-error">
          Start date is required.
        </div>
      </div>

      <div class="col-md-6">
        <label for="activeTo" class="form-label">Active To</label>
        <input
          type="date"
          id="activeTo"
          name="activeTo"
          class="form-control"
          [min]="minDate"
          [(ngModel)]="examData.activeTo"
          required
          #activeTo="ngModel"
        />
        <div *ngIf="activeTo.invalid && activeTo.touched" class="validation-error">
          End date is required.
        </div>
        <div
          *ngIf="
            examData.activeFrom &&
            examData.activeTo &&
            examData.activeTo < examData.activeFrom
          "
          class="text-danger"
        >
          End date must be after Start date.
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="mt-4">
      <label for="description" class="form-label">Exam Description</label>
      <textarea
        id="description"
        class="form-control"
        name="description"
        [(ngModel)]="examData.description"
        required
        minlength="30"
        #description="ngModel"
      ></textarea>
      <div *ngIf="description.invalid && description.touched" class="validation-error">
        Description is required (min 30 characters).
      </div>
    </div>

    <!-- Upload -->
    <div class="exam-upload-card">
      <h5>📁 Upload Exam Excel File</h5>
      <input
        type="file"
        class="form-control"
        (change)="onFileChange($event)"
        accept=".xls,.xlsx,.csv"
      />
      <div *ngIf="fileError" class="text-danger">{{ fileError }}</div>
    </div>

    <!-- Submit -->
    <button
      type="submit"
      class="btn text-white w-100"
      [disabled]="examForm.invalid || !excelFile || formSubmit"
    >
      @if (formSubmit) {
        <span class="spinner-border spinner-border-sm" role="status"></span>
        Uploading...
      } @else {
        Upload Exam
      }
    </button>
  </form>
</div>
