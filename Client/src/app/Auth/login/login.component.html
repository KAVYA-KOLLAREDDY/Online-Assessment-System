<div class="container-fluid">
  <div class="row">
    <!-- Left Half -->
    <div class="col-md-6 d-none d-md-block left-half">
      <div class="logo"><img src="/image.png" /></div>
      <div class="image-container">
        <div class="box">
          <div class="text">
            Crafting Skills,<br />Shaping Futures
          </div>
        </div>
        <div class="image-wrapper">
          <img src="/img1.png" class="top-image" />
        </div>
      </div>
    </div>

    <!-- Right Half -->
    <div class="col-md-6">
      <div class="register">
        <button class="btn-register" [routerLink]="['/register', 'student']">Register</button>
      </div>
      <div class="right-half">
        <div class="login-container">
          <h2 class="text-center">Log in with email</h2>

          <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
            <!-- Email -->
            <div class="input-group mb-3">
              <ng-icon name="bootstrapAt" class="icon-style"></ng-icon>
              <input
                type="email"
                class="form-control ps-5"
                placeholder="Email Id"
                ngModel
                name="email"
                required
                #email="ngModel"
              />
            </div>
            <div *ngIf="email.invalid && email.touched" class="text-danger small mb-3">
              Valid email is required.
            </div>

            <!-- Password -->
            <div class="input-group mb-3">
              <ng-icon name="bootstrapKeyFill" class="icon-style key"></ng-icon>
              <input
                type="password"
                class="form-control ps-5"
                id="password"
                placeholder="Password"
                ngModel
                name="password"
                required
                minlength="3"
                #password="ngModel"
              />
            </div>
            <div *ngIf="password.invalid && password.touched" class="text-danger small mb-3">
              Password must be at least 3 characters.
            </div>

            <!-- Remember & Forgot -->
            <div class="remember-me mb-3">
              <label><input type="checkbox" /> Remember me</label>
            </div>

            <!-- Login Button -->
            <button
              type="submit"
              class="login-btn"
              [disabled]="loginForm.invalid || submitted"
            >
              @if (submitted) {
              <div class="spinner-border spinner-border-sm" role="status">
                <span class="visually-hidden">Loading...</span>
              </div> Logging in...
              } @else {
              Login
              }
            </button>

            <!-- Forgot Password -->
            <button class="forgot-password mt-4">Forget <span>Password</span></button>

            <!-- Register Links -->
            <div class="text-center mt-4">
              <p class="small fw-bold mb-1">Don't have an account?</p>
              <div class="d-flex gap-2 justify-content-center">
                <a
                  href="#"
                  class="link-danger text-decoration-none"
                  [routerLink]="['/register', 'student']"
                  >Register as Student</a
                >
                Or
                <a
                  href="#"
                  class="link-danger text-decoration-none"
                  [routerLink]="['/register', 'examiner']"
                  >Register as Examiner</a
                >
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
