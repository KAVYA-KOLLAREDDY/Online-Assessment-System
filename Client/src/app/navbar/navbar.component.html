<nav class="navbar navbar-expand-lg custom-navbar p-3 px-4" *ngIf="showNavbar">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold fst-italic text-white fs-4">Online Assessment System</a>

    <button
      class="navbar-toggler text-white border-white"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav fw-semibold align-items-center gap-3">
        @if (user() === null) {
        <li class="nav-item">
          <a routerLink="/login" routerLinkActive="active" class="nav-link nav-pill">Login</a>
        </li>
        } @else {
        <li class="nav-item">
          <span class="nav-link welcome-text">👋 Welcome, {{ user()?.username }}</span>
        </li>
        <li class="nav-item">
          <button class="nav-link nav-pill logout-link" (click)="onLogout()"><span>Logout</span></button>
        </li>
        }
      </ul>
    </div>
  </div>
</nav>
